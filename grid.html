<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<style>
    .main{
        background-color: chartreuse;
        display: grid;
        width: 100%;
        height: 100vh;
        grid-template-columns:1fr 4fr 1fr ;
        grid-template-rows: 1fr 1fr 10fr 1fr;
    }

    .d1{
        grid-column: 1/4;
        grid-row: 1/2;
        background-color: aqua;
    }
    .d2{
        grid-column: 1/2;
        grid-row: 2/4;
        background-color:  blue;
    }
    .d3{
        grid-column: 2/3;
        grid-row: 2/3;
        background-color:red ;
    }
    .d4{
        grid-column: 3/4;
        grid-row: 2/4;
        background-color: green;
    }
    .d5{
        grid-column: 2/3;
        grid-row: 3/4;
        background-color: yellow;
    }
    .d6{
        grid-column: 1/4;
        grid-row: 4/5;
        background-color: violet;
    }
    
    @media(max-width:750px){
        .main{
        background-color: chartreuse;
        display: grid;
        width: 100%;
        height: 100vh;
        grid-template-columns:1fr 4fr ;
        grid-template-rows: 1fr 1fr 10fr 1fr 1fr;
    }

    .d1{
        grid-column: 1/3;
        grid-row: 1/2;
        background-color: rgb(0, 255, 72);
    }
    .d2{
        grid-column: 1/2;
        grid-row: 2/4;
        background-color:  rgb(255, 0, 0);
    }
    .d3{
        grid-column: 2/3;
        grid-row: 2/3;
        background-color:rgb(0, 255, 255) ;
    }
    .d4{
        grid-column: 1/3;
        grid-row: 4/5;
        background-color: green;
    }
    .d5{
        grid-column: 2/3;
        grid-row: 3/4;
        background-color: yellow;
    }
    .d6{
        grid-column: 1/3;
        grid-row: 5/6;
        background-color: violet;
    }

    }
    @media(max-width:500px){
        .main{
        background-color: chartreuse;
        display: grid;
        width: 100%;
        height: 100vh;
        grid-template-columns:1fr;
        grid-template-rows: 1fr 2fr 1fr 2fr 5fr 1fr;
    }

    .d1{
        grid-column: 1/2;
        grid-row: 1/2;
        background-color: rgb(255, 0, 166);
    }
    .d2{
        grid-column: 1/2;
        grid-row: 2/3;
        background-color:  rgb(115, 115, 175);
    }
    .d3{
        grid-column: 1/2;
        grid-row: 3/4;
        background-color:rgb(16, 64, 37) ;
    }
    .d4{
        grid-column: 1/2;
        grid-row: 4/5;
        background-color: rgb(144, 159, 7);
    }
    .d5{
        grid-column: 1/2;
        grid-row: 5/6;
        background-color: rgb(255, 34, 0);
    }
    .d6{
        grid-column: 1/2;
        grid-row: 6/7;
        background-color: rgb(93, 3, 93);
    }

    }
    

</style>
<body style="margin: 0px;">
    <div class="main">

        <div class="d1">1</div>
        <div class="d2">2</div>
        <div class="d3">3</div>
        <div class="d4">4</div>
        <div class="d5">5</div>
        <div class="d6">6</div>
        

    </div>
    
</body>
</html>
